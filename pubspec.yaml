name: new_autobus
description: "A modern To-Do app built for Android."
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: ^3.11.1 # Matches Dart version for Flutter 3.41.4

dependencies:
  flutter:
    sdk: flutter
    
  # Icons for iOS style if needed
  cupertino_icons: ^1.0.8

  # Dependencies for Local Storage (SQLite)
  sqflite: ^2.4.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0 # Latest linting rules for 2026

flutter:
  uses-material-design: true
